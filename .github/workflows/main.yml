on:
  push:
    branches:
      - main

name: Publish Website
jobs:
  web-deploy:
    name: 🚀 Deploy Website Every Commit
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get Latest Code
      uses: actions/checkout@v4
    
    - name: 🔑 Configure SSH and Deploy
      env:
        SSH_KEY: ${{ secrets.SSH_KEY }}
      run: |
        # 1. Setup secure .ssh directory
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        # 2. Format and inject private key cleanly
        echo "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

        # 3. Add remote host to known_hosts to prevent interactive prompts
        ssh-keyscan -H redfang.net >> ~/.ssh/known_hosts

        # 4. Execute native rsync deployment
        rsync --archive --verbose --compress --human-readable --delete-after \
          --exclude='.git*' \
          --exclude='README.md' \
          --exclude='readme.md' \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./ redfangn@redfang.net:~/www/push-test/
