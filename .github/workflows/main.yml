on:
  push:
    branches:
      - main

name: Publish Website
jobs:
  web-deploy:
    name: 🚀 Deploy Website Every Commit
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get Latest Code
      uses: actions/checkout@v4
    
    # New step to fix formatting and manually place the key where the action expects it
    - name: 🔑 Fix and Inject SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/web_deploy_key
        sed -i 's/\r$//' ~/.ssh/web_deploy_key # Remove any hidden Windows carriage returns
        chmod 600 ~/.ssh/web_deploy_key        # Strict private key permissions
    
    - name: 📂 Sync Files
      uses: SamKirkland/web-deploy@v1
      with:
        target-server: redfang.net
        remote-user: redfangn
        private-ssh-key: ${{ secrets.SSH_KEY }}
        destination-path: ~/www/push-test/
